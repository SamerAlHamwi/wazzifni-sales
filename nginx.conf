server {
    listen 80;
    server_name sales.wazzifni.online admin.wazzifni.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sales.wazzifni.online;

    ssl_certificate /etc/letsencrypt/live/sales.wazzifni.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sales.wazzifni.online/privkey.pem;

    root /usr/share/nginx/html;

    location / {
        index rep.html;
        try_files $uri $uri/ /rep.html;
    }

    location /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name admin.wazzifni.online;

    ssl_certificate /etc/letsencrypt/live/sales.wazzifni.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sales.wazzifni.online/privkey.pem;

    root /usr/share/nginx/html;

    location / {
        index admin.html;
        try_files $uri $uri/ /admin.html;
    }

    location /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
