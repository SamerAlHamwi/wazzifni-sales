version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: wazzifni-mongodb
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wazzifni-backend
    restart: always
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/wazifni
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - mongodb

  nginx:
    image: nginx:alpine
    container_name: wazzifni-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  mongo_data:
